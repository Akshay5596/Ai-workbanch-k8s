apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vector-db
  labels:
    app.kubernetes.io/name: vector-db
spec:
  serviceName: vector-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vector-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vector-db
    spec:
      containers:
        - name: vector-db
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: vector-db-secret
          volumeMounts:
            - name: vector-db-data
              mountPath: /var/lib/postgresql/data
          resources:
{{ toYaml .Values.resources | indent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: vector-db-data
        labels:
          app.kubernetes.io/name: vector-db
      spec:
        accessModes:
{{ toYaml .Values.persistence.accessModes | indent 10 }}
        storageClassName: {{ .Values.persistence.storageClassName | quote }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}